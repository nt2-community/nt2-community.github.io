<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="description" content="NT² Community — open projects for Vault micro-apps, templates, and developer docs." />
		<script>
			(function () {
				const key = 'theme';
				const stored = localStorage.getItem(key);
				const theme =
					stored === 'light' || stored === 'dark'
						? stored
						: window.matchMedia('(prefers-color-scheme: dark)').matches
							? 'dark'
							: 'light';
				document.documentElement.setAttribute('data-theme', theme);
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover" class="min-h-screen bg-base-200">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
